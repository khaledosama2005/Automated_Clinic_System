<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient & Queue Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Patient & Queue Dashboard</h1>
      <p>Live priority queues for Emergency, Cardiology, and Orthopedics</p>
    </div>
    <button id="refreshBtn" class="secondary-btn">Refresh Queues</button>
  </header>

  <main class="layout">
    <section class="panel registration-panel">
      <h2>Register Patient</h2>
      <form id="patientForm">
        <label>
          Patient Name
          <input id="patientName" type="text" placeholder="Enter patient name" required />
        </label>

        <label>
          Clinic
          <select id="clinicSelect" required></select>
        </label>

        <label>
          Condition
          <select id="conditionSelect" required></select>
        </label>

        <div id="otherConditionBox" class="hidden other-box">
          <label>
            Other Condition Description
            <input id="otherConditionName" type="text" placeholder="Describe condition" />
          </label>
          <label>
            Receptionist Urgency Assessment
            <select id="otherUrgencySelect">
              <option value="1">Elective</option>
              <option value="2">Non-Urgent</option>
              <option value="3">Semi-Urgent</option>
              <option value="4">Urgent</option>
              <option value="5">Critical</option>
            </select>
          </label>
          <label>
            Estimated Treatment Time (minutes)
            <input id="otherTreatmentTime" type="number" min="1" value="20" />
          </label>
        </div>

        <button type="submit" class="primary-btn">Add Patient</button>
      </form>
    </section>

    <section class="queues-section" id="queuesContainer"></section>
  </main>

  <template id="patientCardTemplate">
    <article class="patient-card">
      <div class="patient-main">
        <strong class="patient-name"></strong>
        <span class="patient-condition"></span>
      </div>
      <div class="patient-meta">
        <span class="badge"></span>
        <span class="score"></span>
        <span class="arrival"></span>
      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
